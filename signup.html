<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css">
    <title>signup page</title>
</head>
<body>
    <div class="login-page">
    <div class="login-container">
        <div class="login-visual">
            <div class="visual-bg-shape"></div>
            <img src="images/Traveller 1.png" alt="Travel with us" class="floating-img">
            <div class="visual-text">
                <h3>Join our adventure!</h3>
                <p>Discover the world's best destinations with Jadoo.</p>
            </div>
        </div>

        <div class="login-content">
            <div class="logo">
                <h1>Jadoo<span class="dot1"></span><span class="dot2"></span></h1>
            </div>
            
            <h2 class="login-title">Create Account</h2>
            <p class="login-subtitle">Start your journey with us today.</p>

            <form class="login-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" placeholder="Abd Al-Minhem Ayyash" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to the <a href="#" class="forgot-pass">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn-login">Create Account</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>

                <button type="button" class="btn-google">
                    <img src="images/google.png" width="20px" alt="Google">
                    Continue with Google
                </button>
            </form>

            <p class="signup-link">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
</div>
</body>
</html>
