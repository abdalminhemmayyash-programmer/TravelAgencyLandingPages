<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
</head>
<body>
    <div class="login-page">
    <div class="login-container">
        <div class="login-content">
            <link rel="stylesheet" href="css/Login.css">
            <div class="logo">
                <h1>Jadoo<span class="dot1"></span><span class="dot2"></span></h1>
            </div>
            
            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Please enter your details to sign in.</p>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
                
                <div class="divider">
                    <span>OR</span>
                </div>

                <button type="button" class="btn-google">
                    <img src="images/google.png" width="20px" alt="Google">
                    Continue with Google
                </button>
            </form>

            <p class="signup-link">Don't have an account? <a href="signup.html">Sign up for free</a></p>
        </div>
        
        <div class="login-visual">
            <div class="visual-bg-shape"></div>
            <img src="images/Traveller 1.png" alt="Travel" class="floating-img">
        </div>
    </div>
</div>
</body>
</html>
